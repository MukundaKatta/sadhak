name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Syntax-check JavaScript modules
        run: |
          status=0
          for file in $(git ls-files '*.mjs' '*.js'); do
            echo "Checking $file"
            node --check "$file" || status=1
          done
          exit $status
